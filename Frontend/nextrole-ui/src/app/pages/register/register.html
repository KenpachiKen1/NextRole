<div class="min-h-screen bg-white flex items-center justify-center px-4">
  <div class="w-full max-w-md">

    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold bg-gradient-to-r from-purple-600 to-blue-500 bg-clip-text text-transparent">
        NextRole
      </h1>
      <p class="text-gray-500 mt-2 text-sm">Create your account to start tracking applications</p>
    </div>

    <div class="bg-white rounded-2xl shadow-lg border border-gray-100 p-8">
      <form class="space-y-5">

            <form [formGroup] = "signupForm" (ngSubmit)="onSubmit()">
              <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input id="email" type="email" placeholder="Enter email" class="w-full px-4 py-2.5 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-purple-400 focus:border-transparent transition"/>
            
               </div>
            <div>
            <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <input
                id="password"
                type="password"
                placeholder="123456....don't make it that"
                class="w-full px-4 py-2.5 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-purple-400 focus:border-transparent transition"/>
        
            </div>

            <div>
                <label for="username" class="block text-sm font-medium text-gray-500 mb-1">Username</label>
                <input id="username" type="text" placeholder="Make it something fun!" class="w-full px-4 py-2.5 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-purple-400 focus:border-transparent transition"/>
            </div>

            <div>
                <label for="firstName" class="block text-sm font-medium text-gray-500 mb-1">First Name</label>
                <input id="firstName" type="text" placeholder="" class="w-full px-4 py-2.5 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-purple-400 focus:border-transparent transition"/>
            </div>

            <div>
                <label for="lastName" class="block text-sm font-medium text-gray-500 mb-1">Last Name</label>
                <input id="lastName" type="text" placeholder="" class="w-full px-4 py-2.5 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-purple-400 focus:border-transparent transition"/>
            </div>

        <button
          type="submit"
          class="w-full py-2.5 rounded-lg text-white font-medium bg-gradient-to-r from-purple-600 to-blue-500 hover:from-purple-700 hover:to-blue-600 transition shadow-md shadow-purple-200 mt-4">
          Create account
        </button>
            </form>
         

        <div class="rounded-lg border-l-4 border-purple-400 bg-gradient-to-r from-purple-50 to-blue-50 px-4 py-3 text-sm text-gray-600">
          Free accounts can track up to 10 active applications.
        </div>

      </form>

      <p class="text-center text-sm text-gray-500 mt-6">
        Already have an account?
        <a href="#" class="text-purple-600 font-medium hover:text-blue-600 transition">Sign in</a>
      </p>
    </div>
  </div>
</div>
